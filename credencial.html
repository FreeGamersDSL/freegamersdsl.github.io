<head>
    <meta charset="UTF-8">

    <!-- Librería externa para permitir la descarga de la tarjeta militar como imagen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
    <Style>
        /* --- VARIABLES Y CONFIGURACIÓN --- */
        :root {
            --bg-dark: #07080d;
            --bg-card: #12141c;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --cyan-glow: #00f2fe;
            --orange-glow: #ff8c00;
            --red-glow: #ff2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding-top: 80px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- CONTENEDORES GENERALES --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
        }

        .section-subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        /* --- NUEVO: GENERADOR DE TARJETA MILITAR --- */
        .id-generator-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: #11131a;
            padding: 35px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            align-items: center;
        }

        /* Formulario */
        .id-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            background: #181b26;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 12px;
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--cyan-glow);
        }

        /* Estructura Visual de la Tarjeta */
        .id-card-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .military-id-card {
            width: 450px;
            height: 280px;
            background: linear-gradient(135deg, #151821 0%, #090b10 100%);
            border: 2px solid #222533;
            border-radius: 12px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        /* Líneas de diseño militar */
        .military-id-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--cyan-glow), var(--orange-glow));
        }

        .card-watermark {
            position: absolute;
            bottom: 60px;
            right: 6px;
            font-size: 6rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.015);
            text-transform: uppercase;
            user-select: none;
            pointer-events: none;
        }

        .card-inner-layout {
            display: flex;
            height: 100%;
            gap: 15px;
        }

        .card-photo-side {
            width: 120px;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .card-photo-side img {
            height: 90%;
            object-fit: contain;
            filter: drop-shadow(0 0 4px rgba(0, 242, 254, 0.5));
        }

        .card-info-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-logo-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 5px;
        }

        .card-clan-name {
            font-size: 0.95rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
        }

        .card-clan-name span {
            color: var(--cyan-glow);
        }

        .card-meta-tag {
            font-family: monospace;
            font-size: 0.65rem;
            color: var(--red-glow);
            font-weight: bold;
        }

        .card-main-data {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .card-user-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-data-line {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .card-data-line strong {
            color: #cbd5e1;
            text-transform: uppercase;
        }

        .card-footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 5px;
            font-family: monospace;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-download-card {
            background: linear-gradient(90deg, #10b981, #059669);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-download-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .card-signature-box {
            margin-top: 8px;
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
            padding-top: 4px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .card-signature-box {
            margin-top: 8px;
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
            padding-top: 4px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .signature-display {
            font-family: 'Satisfy', cursive;
            font-size: 1.2rem;
            color: #00ff66;
            /* Combina con el verde de la frecuencia de radio */
            letter-spacing: 0.5px;
        }
    </Style>
</head>

    <script>
        // ACTUALIZACIÓN DE TARJETA MILITAR EN TIEMPO REAL
        function updateCard() {
            const nameInput = document.getElementById('input-name').value.trim();
            const platformSelect = document.getElementById('select-platform').value;
            // Capturar los valores de los 3 selectores de roles
            const role1 = document.getElementById('select-role-1').value;
            const role2 = document.getElementById('select-role-2').value;
            const role3 = document.getElementById('select-role-3').value;
            const skinSelect = document.getElementById('select-skin').value;
            const radioInput = document.getElementById('input-frecuencia').value.trim();

            // Guardar en un array solo los roles que no estén vacíos
            let rolesSeleccionados = [];
            if (role1 !== "") rolesSeleccionados.push(role1);
            if (role2 !== "") rolesSeleccionados.push(role2);
            if (role3 !== "") rolesSeleccionados.push(role3);

            // Juntar los roles con una coma y espacio (Ej: "Miembro, Conquistador, Líder")
            // Si por alguna razón todos están vacíos, mostrará "Miembro" por defecto
            const textoRoles = rolesSeleccionados.length > 0 ? rolesSeleccionados.join(', ') : "Miembro";

            // Elementos de la tarjeta
            document.getElementById('card-display-name').innerText = nameInput !== "" ? nameInput : "TU_NICKNAME";
            document.getElementById('card-display-platform').innerText = platformSelect;
            // Asignar la cadena de roles ya formateada con comas
            document.getElementById('card-display-role').innerText = textoRoles;
            document.getElementById('card-display-skin').innerText = skinSelect;
            document.getElementById('cred-frecuencia').innerText = radioInput !== "" ? radioInput : "123456";

            // Cambiar imagen de la skin dinámicamente usando la API oficial de open.mp
            // SOLUCIÓN LOCAL: Al estar en tu propio servidor/carpeta, no sufres por bloqueos de seguridad
            document.getElementById('card-skin-img').src = `skins/${skinSelect}.png`;

            // Dentro de tu función updateCard() existente añade:
            const firmaInput = document.getElementById('input-firma') ? document.getElementById('input-firma').value.trim() : "";
            document.getElementById('card-display-firma').innerText = firmaInput !== "" ? firmaInput : (nameInput !== "" ? nameInput : "FreeGamers");
        }

        // DESCARGAR TARJETA MILITAR COMO IMAGEN (.PNG)
        function downloadIDCard() {
            const name = document.getElementById('input-name').value.trim() || "FreeGamers_ID";
            const cardElement = document.getElementById('card-to-capture');

            html2canvas(cardElement, {
                useCORS: true,
                allowTaint: false, // Evita que se ensucie el canvas con recursos sin permisos
                backgroundColor: null,
                scale: 2
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Credencial_${name}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(error => {
                console.error("Error al generar la credencial: ", error);
                alert("Hubo un detalle al exportar la tarjeta, intenta de nuevo.");
            });
        }
    </script>
