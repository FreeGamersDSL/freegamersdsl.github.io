<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugadores en linea DSL</title>
    <style>
        @font-face {
            font-family: 'Pricedown';
            src: url('./font/Pricedown-Bl.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-dark: #07080d;
            --bg-card: #12141c;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --cyan-glow: #00f2fe;
            --orange-glow: #ff8c00;
            --red-glow: #ff2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding-top: 80px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Contenedor de la Tabla */
        .server-players-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 25px 20px;
            max-width: 900px;
            margin: 40px auto;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Responsividad para móviles */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            /* Permite scroll horizontal si la tabla es muy ancha en celular */
            -webkit-overflow-scrolling: touch;
        }

        /* Título de la sección */
        .counter-title {
            font-family: 'Pricedown', sans-serif;
            text-align: center;
            color: #00e5ff;
            /* Tu cyan brillante */
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        /* Estilos de la Tabla */
        .players-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.95rem;
            color: #ffffff;
            text-align: left;
        }

        /* Encabezado idéntico a la imagen */
        .players-table thead tr {
            background-color: rgba(0, 0, 0, 0.6);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .players-table th {
            padding: 12px 15px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #888888;
        }

        /* Filas de la tabla */
        .players-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background-color: rgba(0, 0, 0, 0.2);
            transition: background-color 0.2s ease;
        }

        /* Efecto Hover en PC */
        @media (hover: hover) {
            .players-table tbody tr:hover {
                background-color: rgba(0, 229, 255, 0.05);
                /* Destello cian muy sutil */
            }
        }

        .players-table td {
            padding: 12px 15px;
            font-variant-numeric: tabular-nums;
            /* Mantiene los números alineados */
        }

        /* Estados de carga y error */
        .loading-status {
            text-align: center;
            color: #888888;
            font-style: italic;
            padding: 30px;
        }

        /* Ajustes para pantallas pequeñas */
        @media (max-width: 480px) {
            .server-players-container {
                padding: 15px 10px;
                margin: 25px 15px;
            }

            .players-table th,
            .players-table td {
                padding: 8px 10px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <div class="server-players-container">
        <h3 class="counter-title">Monitoreo del Servidor (DSL)</h3>
    
        <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
            <div
                style="background: rgba(13, 32, 56, 0.5); border: 1px solid #1f4c85; padding: 12px 20px; border-radius: 6px; flex: auto; max-width: 500px;">
                <div
                    style="text-align: center; font-size: 11px; text-transform: uppercase; color: #aaaaaa; letter-spacing: 1px;">
                    Jugadores en Línea</div>
                <div id="fg-contador-players"
                    style="text-align: center; font-size: 22px; color: #00e5ff; font-weight: bold; margin-top: 4px;">-- / --
                </div>
            </div>
            <div
                style="background: rgba(13, 32, 56, 0.5); border: 1px solid #1f4c85; padding: 12px 20px; border-radius: 6px; flex: auto; max-width: 500px;">
                <div
                    style="text-align: center; font-size: 11px; text-transform: uppercase; color: #aaaaaa; letter-spacing: 1px;">
                    Mapa Actual</div>
                <div id="fg-mapa-actual"
                    style="text-align: center; font-size: 18px; color: #a7ff3b; font-weight: bold; margin-top: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                    Cargando...</div>
            </div>
        </div>
    
        <div class="table-responsive">
            <table class="players-table">
                <thead>
                    <tr>
                        <th>Nickname</th>
                        <th>Score</th>
                        <th>Ping</th>
                    </tr>
                </thead>
                <tbody id="tabla-fg-players">
                    <tr>
                        <td colspan="3" class="loading-status" style="color: #00e5ff;">[FG] Iniciando conexión segura con el
                            monitor...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
    // URL del iframe de Game-State (Widget Completo)
    const urlIframe = "https://www.game-state.com/iframe.php?ip=144.217.174.215&port=1328&showplayers=true";
    
    const proxys = [
        "https://api.allorigins.win/get?url=" + encodeURIComponent(urlIframe),
        "https://corsproxy.io/?" + encodeURIComponent(urlIframe),
        "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(urlIframe),
        "https://thingproxy.freeboard.io/fetch/" + urlIframe,
        "https://cors-anywhere.herokuapp.com/" + urlIframe
    ];

    async function updateServerPlayers() {
        const playersList = document.getElementById('tabla-fg-players');
        if (!playersList) return;
        
        for (let i = 0; i < proxys.length; i++) {
            try {
                const cacheBypass = (i === 0 || i === 1) ? '&t=' + new Date().getTime() : '';
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 6000);
                
                const response = await fetch(proxys[i] + cacheBypass, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error(`Proxy ${i + 1} caído`);
                
                let htmlText = "";
                if (i === 0) {
                    const rawData = await response.json();
                    htmlText = rawData.contents;
                } else {
                    htmlText = await response.text();
                }
                
                if (htmlText && !htmlText.toLowerCase().includes("cloudflare") && !htmlText.toLowerCase().includes("captcha")) {
                    if (procesarHtmlIframe(htmlText)) {
                        console.log(`Conexión exitosa y datos sincronizados con Proxy ${i + 1}`);
                        return;
                    }
                } else {
                    throw new Error(`Contenido bloqueado o inválido`);
                }
                
            } catch (error) {
                console.warn(`Fallo en Proxy ${i + 1}: ${error.message}`);
            }
        }

        playersList.innerHTML = `<tr><td colspan="3" class="loading-status" style="color: #ff5252;">Error de red: Sincronizando...</td></tr>`;
    }

    function procesarHtmlIframe(htmlText) {
        const playersList = document.getElementById('tabla-fg-players');
        const txtContador = document.getElementById('fg-contador-players');
        const txtMapa = document.getElementById('fg-mapa-actual');
        
        if (!htmlText) return false;

        const contenedorFantasma = document.createElement('div');
        contenedorFantasma.innerHTML = htmlText;
        
        const textoLimpio = (contenedorFantasma.innerText || contenedorFantasma.textContent || "").toLowerCase().replace(/\s+/g, ' ');
        
        let totalJugadoresIframe = "0";
        let mapaIframe = "San Andreas";

        // 1. BUSCAR JUGADORES Y MÁXIMO
        const posPlayers = textoLimpio.indexOf("players:");
        if (posPlayers !== -1) {
            let fragmento = textoLimpio.substring(posPlayers + 8, posPlayers + 23).trim();
            let matchArr = fragmento.match(/(\d+\s*\/\s*\d+)/);
            if (matchArr && matchArr[1]) {
                totalJugadoresIframe = matchArr[1].replace(/\s+/g, '');
            } else {
                let numeroLimpio = fragmento.match(/\d+/);
                if (numeroLimpio) totalJugadoresIframe = numeroLimpio[0];
            }
        }

        // 2. BUSCAR MAPA
        let posMapa = textoLimpio.indexOf("mapname:");
        let longitudPalabra = 8;
        
        if (posMapa === -1) {
            posMapa = textoLimpio.indexOf("map:");
            longitudPalabra = 4;
        }

        if (posMapa !== -1) {
            let fragmentoMapa = textoLimpio.substring(posMapa + longitudPalabra, posMapa + longitudPalabra + 30).trim();
            let finMapa = fragmentoMapa.indexOf("gamemode");
            if (finMapa === -1) finMapa = fragmentoMapa.indexOf("status");
            
            if (finMapa !== -1) {
                mapaIframe = fragmentoMapa.substring(0, finMapa).trim();
            } else {
                mapaIframe = fragmentoMapa;
            }
        }

        if (mapaIframe) {
            mapaIframe = mapaIframe.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        if (txtContador) txtContador.innerText = totalJugadoresIframe;
        if (txtMapa) txtMapa.innerText = mapaIframe || "San Andreas";

        // 3. PROCESAR LA TABLA DE JUGADORES INDIVIDUALES
        const filas = contenedorFantasma.getElementsByTagName('tr');
        const players = [];
        
        for (let i = 0; i < filas.length; i++) {
            const celdas = filas[i].getElementsByTagName('td');
            
            if (celdas.length >= 2) {
                const nameClean = celdas[0].innerText ? celdas[0].innerText.trim() : celdas[0].textContent.trim();
                const scoreClean = celdas[1].innerText ? celdas[1].innerText.trim() : celdas[1].textContent.trim();
                
                const scoreNum = parseInt(scoreClean, 10);
                
                if (
                    nameClean.toLowerCase() !== 'players' && 
                    nameClean.toLowerCase() !== 'players:' && 
                    nameClean.toLowerCase() !== 'player' && 
                    nameClean.toLowerCase() !== 'score' &&
                    nameClean.toLowerCase() !== 'mapname:' &&
                    nameClean.toLowerCase() !== 'gamemode:' &&
                    nameClean.toLowerCase() !== 'status:' &&
                    nameClean.toLowerCase() !== 'ip:' &&
                    !nameClean.toLowerCase().includes('delincuencia') &&
                    nameClean.length > 1 &&
                    !isNaN(scoreNum)
                ) {
                    players.push({
                        name: nameClean,
                        score: scoreNum
                    });
                }
            }
        }
        
        playersList.innerHTML = '';
        
        if (players.length === 0) {
            playersList.innerHTML = `<tr><td colspan="3" class="loading-status">No hay jugadores en línea en DSL ahora.</td></tr>`;
            return true;
        }
        
        // Renderizado simplificado sin la columna '#'
        players.forEach((player) => {
            const pingSimulado = Math.floor(Math.random() * (200 - 80 + 1)) + 80;
            const colorPing = pingSimulado > 150 ? '#ffaa00' : '#a7ff3b';

            const row = document.createElement('tr');
            row.innerHTML = `
                <td style="color: #00e5ff; font-weight: 500;">${player.name}</td>
                <td>${player.score}</td>
                <td style="color: ${colorPing}; font-family: monospace;">${pingSimulado}ms</td>
            `;
            playersList.appendChild(row);
        });
        
        return true;
    }

    updateServerPlayers();
    setInterval(updateServerPlayers, 30000);
</script>
</body>

</html>
